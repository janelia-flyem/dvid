syntax = "proto3";
package proto;

option go_package = "github.com/janelia-flyem/dvid/datatype/common/proto";

message KeyValue {
	string key = 1;
	bytes value = 2;
}

message KeyRange {
	string key = 1;
	uint64 byte_start = 2;
	uint64 byte_end = 3;
}

message Keys {
	repeated string keys = 1;
	repeated KeyRange key_ranges = 2;
}

message KeyValues {
	repeated KeyValue kvs = 1;
}
